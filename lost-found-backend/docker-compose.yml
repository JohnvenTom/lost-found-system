# ============================================================
# 校园失物招领管理系统 - Docker Compose 编排
# 使用方式: docker compose up -d
# 环境变量从 .env 文件自动加载（需先 cp .env.example .env）
# ============================================================

services:
  lost-found-backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: campus-lost-found
    ports:
      - "8088:8088"
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - TZ=Asia/Shanghai
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/api/item/list"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
